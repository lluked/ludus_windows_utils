---
# ludus_bulk_ad_content - Bulk Active Directory content creation
# Modes: goad (default), custom, random
#
# This role runs AFTER Ludus core roles. The following variables are
# automatically provided by Ludus and do NOT need to be set:
#
#   ludus_domain_fqdn          - e.g., "sevenkingdoms.local"
#   ludus_domain_netbios_name  - e.g., "SEVENKINGDOMS"
#   ludus_domain_fqdn_tail     - e.g., "local"
#   ludus_dc_vm_name           - Primary DC VM name
#   ludus_dc_ip                - Primary DC IP address
#   ludus_dc_hostname          - Primary DC hostname
#   defaults.ad_domain_admin   - Domain admin username
#   defaults.ad_domain_admin_password - Domain admin password
#
# For standalone testing (outside Ludus), set these fallback variables:

# =============================================================================
# MODE SELECTION
# =============================================================================
# Options: "goad" | "custom" | "random"
ludus_ad_content_mode: "goad"

# =============================================================================
# FALLBACK DOMAIN CONFIGURATION (only used if Ludus vars not available)
# =============================================================================
ludus_domain_name: ""           # Fallback: set if ludus_domain_fqdn not available
ludus_domain_netbios: ""        # Fallback: set if ludus_domain_netbios_name not available
ludus_domain_admin: "administrator"
ludus_domain_admin_password: "password"

# =============================================================================
# RANDOM MODE CONFIGURATION
# Used when ludus_ad_content_mode is "random"
# =============================================================================
ludus_random_config:
  user_count: 30
  ou_count: 5
  group_count: 8
  password_style: "weak"          # Options: "weak" | "realistic" | "strong"
  department_names:
    - "HR"
    - "IT"
    - "Sales"
    - "Finance"
    - "Marketing"
    - "Engineering"
    - "Operations"
    - "Legal"
  create_service_accounts: true
  service_account_count: 2
  seed: null                       # Set for reproducible generation

# =============================================================================
# CUSTOM MODE DATA
# Used when ludus_ad_content_mode is "custom"
# Override these in role_vars to provide your own AD content
# =============================================================================
ludus_organisation_units: []
ludus_groups:
  global: []
  domainlocal: []
  universal: []
ludus_users: []
ludus_multi_domain_group_members: []

# =============================================================================
# GOAD MODE - EMBEDDED DATASET
# Used when ludus_ad_content_mode is "goad" (default)
