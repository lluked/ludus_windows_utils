---
# ludus_ad_anonymous_rpc - Anonymous RPC/SMB Enumeration Configuration
# Main tasks file

# =============================================================================
# ANONYMOUS ENUMERATION REGISTRY SETTINGS
# =============================================================================

- name: Display anonymous enumeration configuration
  ansible.builtin.debug:
    msg:
      - "Configuring anonymous RPC/SMB enumeration on {{ ansible_hostname }}"
      - "RestrictAnonymous: {{ ludus_restrict_anonymous }}"
      - "RestrictAnonymousSAM: {{ ludus_restrict_anonymous_sam }}"
      - "Anonymous pipes: {{ ludus_anonymous_named_pipes | join(', ') }}"

# LSA Settings
- name: Configure RestrictAnonymous registry key
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: RestrictAnonymous
    data: "{{ ludus_restrict_anonymous }}"
    type: dword
    state: present
  register: _restrict_anonymous

- name: Configure RestrictAnonymousSAM registry key
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: RestrictAnonymousSAM
    data: "{{ ludus_restrict_anonymous_sam }}"
    type: dword
    state: present
  register: _restrict_sam
  when: ludus_anonymous_sam_enumeration | bool

- name: Configure EveryoneIncludesAnonymous registry key
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: EveryoneIncludesAnonymous
    data: "{{ 1 if ludus_everyone_includes_anonymous | bool else 0 }}"
    type: dword
    state: present
  register: _everyone_anon
  when: ludus_everyone_includes_anonymous is defined

- name: Configure NoLmHash (allow LM hash generation for null sessions)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: NoLMHash
    data: 0
    type: dword
    state: present
  when: ludus_null_session_fallback | bool

# LanManServer Settings
- name: Configure NullSessionPipes for anonymous named pipe access
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
    name: NullSessionPipes
    data: "{{ ludus_anonymous_named_pipes }}"
    type: multistring
    state: present
  register: _null_pipes
  notify: restart lanmanserver
  when: ludus_anonymous_named_pipes | length > 0

- name: Configure RestrictNullSessAccess to allow null sessions
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
    name: RestrictNullSessAccess
    data: 0
    type: dword
    state: present
  register: _restrict_null
  notify: restart lanmanserver

# RestrictRemoteSAM — Windows Server 2016+ / Windows 10 1607+
# This SDDL-based registry value gates ALL remote SAM/LSA queries independently
# of the classic RestrictAnonymous/RestrictAnonymousSAM settings.
# Default SDDL "O:BAG:BAD:(A;;RC;;;BA)" only allows Administrators.
# To allow anonymous SAM enumeration, we must either:
#   - Delete the key (fall back to classic behavior), or
#   - Set an empty string (same effect)
# Without this, rpcclient/enum4linux anonymous enumeration fails with
# NT_STATUS_ACCESS_DENIED on Server 2016/2019/2022 even with all classic
# settings configured for anonymous access.
- name: Remove RestrictRemoteSAM to allow anonymous SAM enumeration
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: RestrictRemoteSAM
    state: absent
  register: _restrict_remote_sam
  when: ludus_anonymous_sam_enumeration | bool

# =============================================================================
# AD GROUP MEMBERSHIP FOR ANONYMOUS ACCESS
# =============================================================================

# On Windows Server 2016+/2022 DCs, anonymous SAM/LSA enumeration via RPC
# requires the ANONYMOUS LOGON well-known SID (S-1-5-7) to be a member of
# the "Pre-Windows 2000 Compatible Access" built-in group.
# Without this, rpcclient/enum4linux anonymous queries return
# NT_STATUS_ACCESS_DENIED even with all registry settings correct.
# This is the standard approach used by GOAD and other AD lab frameworks.
- name: Add ANONYMOUS LOGON to Pre-Windows 2000 Compatible Access group
  ansible.windows.win_powershell:
    script: |
      # Check if ANONYMOUS LOGON (S-1-5-7) is already in the group
      $group = [ADSI]"WinNT://./Pre-Windows 2000 Compatible Access,group"
      $members = @($group.Invoke("Members")) | ForEach-Object {
          $_.GetType().InvokeMember("AdsPath", 'GetProperty', $null, $_, $null)
      }

      if ($members -match "S-1-5-7|NT AUTHORITY\\ANONYMOUS LOGON|ANONYMOUS LOGON") {
          Write-Output "ANONYMOUS LOGON already in Pre-Windows 2000 Compatible Access"
          $Ansible.Changed = $false
      } else {
          # Use net localgroup — most reliable method for well-known SIDs
          $result = net localgroup "Pre-Windows 2000 Compatible Access" "ANONYMOUS LOGON" /add 2>&1
          if ($LASTEXITCODE -eq 0) {
              Write-Output "Added ANONYMOUS LOGON to Pre-Windows 2000 Compatible Access"
              $Ansible.Changed = $true
          } elseif ($result -match "already a member") {
              Write-Output "ANONYMOUS LOGON already a member (net reports duplicate)"
              $Ansible.Changed = $false
          } else {
              Write-Output "Failed: $result"
              $Ansible.Failed = $true
          }
      }
  when: ludus_anonymous_sam_enumeration | bool
  register: _anon_group

# Network access settings via policy
- name: Allow anonymous SID/Name translation (LSA policy)
  ansible.windows.win_powershell:
    script: |
      # Export current security policy
      secedit /export /cfg C:\Windows\Temp\secpol.cfg | Out-Null
      
      # Read current config
      $content = Get-Content C:\Windows\Temp\secpol.cfg -Raw
      
      # Check if already configured correctly
      if ($content -match 'LSAAnonymousNameLookup\s*=\s*1') {
          Write-Output "LSAAnonymousNameLookup already set to 1"
          $Ansible.Changed = $false
      } else {
          # Read as lines for modification
          $lines = Get-Content C:\Windows\Temp\secpol.cfg
          
          # Replace existing 0 with 1, or add if missing
          $modified = $false
          $lines = $lines | ForEach-Object {
              if ($_ -match 'LSAAnonymousNameLookup\s*=\s*0') {
                  $modified = $true
                  'LSAAnonymousNameLookup = 1'
              } else {
                  $_
              }
          }
          
          if (-not $modified -and ($lines -notmatch 'LSAAnonymousNameLookup')) {
              $lines = $lines -replace '\[System Access\]', "[System Access]`r`nLSAAnonymousNameLookup = 1"
          }
          
          $lines | Set-Content C:\Windows\Temp\secpol.cfg
          
          # Apply modified policy
          secedit /configure /db C:\Windows\Temp\secedit.sdb /cfg C:\Windows\Temp\secpol.cfg /areas SECURITYPOLICY | Out-Null
          
          Write-Output "LSAAnonymousNameLookup configured to 1"
          $Ansible.Changed = $true
      }
      
      # Cleanup
      Remove-Item C:\Windows\Temp\secpol.cfg -Force -ErrorAction SilentlyContinue
      Remove-Item C:\Windows\Temp\secedit.sdb -Force -ErrorAction SilentlyContinue
  when: ludus_anonymous_lsa_enumeration | bool
  register: _lsa_policy

# =============================================================================
# RESTART SERVICES
# =============================================================================

# LSA registry changes (RestrictAnonymous, RestrictAnonymousSAM, EveryoneIncludesAnonymous,
# LSAAnonymousNameLookup) require a full Windows reboot to take effect.
# A LanmanServer restart alone is NOT sufficient for these settings.
- name: Reboot to apply LSA anonymous enumeration registry settings
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 30
  register: _lsa_reboot
  when: >
    (_restrict_anonymous.changed | default(false)) or
    (_restrict_sam.changed | default(false)) or
    (_everyone_anon.changed | default(false)) or
    (_lsa_policy.changed | default(false)) or
    (_restrict_remote_sam.changed | default(false)) or
    (_anon_group.changed | default(false))

# Rebooting a domain-joined machine (especially a child DC) can break:
#   1. The machine's own secure channel (Test-ComputerSecureChannel covers this)
#   2. The INTER-DOMAIN TRUST channel with parent/trusted domains
# Test-ComputerSecureChannel on a DC only tests the DC's own machine account against
# its own domain — which trivially passes since it IS the DC. It does NOT test the
# trust channel to the parent domain. When the trust channel is broken, the child DC
# cannot forward authentication for parent domain users (e.g., domainadmin@parent),
# causing domain joins to fail with "The specified network name is no longer available"
# or "Access is denied".

- name: Verify and repair domain secure channel after reboot
  ansible.windows.win_powershell:
    script: |
      if (-not (Test-ComputerSecureChannel -ErrorAction SilentlyContinue)) {
          Test-ComputerSecureChannel -Repair -ErrorAction Stop
          $Ansible.Changed = $true
      } else {
          $Ansible.Changed = $false
      }
  register: _anon_rpc_channel_repair
  until: _anon_rpc_channel_repair is succeeded
  retries: 5
  delay: 30
  when: _lsa_reboot.changed | default(false)

# After reboot + channel repair, wait for critical DC services to fully initialize.
# The secure channel repair may return success before ADWS/Netlogon/KDC are fully
# operational, which causes downstream roles (e.g., child domain joins) to fail.
- name: Wait for ADWS service to stabilize after reboot
  ansible.windows.win_service:
    name: ADWS
    state: started
  register: _adws_ready
  until: _adws_ready is succeeded
  retries: 20
  delay: 15
  when: _lsa_reboot.changed | default(false)

- name: Wait for Netlogon service to stabilize after reboot
  ansible.windows.win_service:
    name: Netlogon
    state: started
  register: _netlogon_ready
  until: _netlogon_ready is succeeded
  retries: 20
  delay: 15
  when: _lsa_reboot.changed | default(false)

# Reset inter-domain trust secure channels after reboot.
# On a child DC, the trust channel to the parent domain is separate from the machine
# secure channel. nltest /sc_reset forces the Netlogon service to re-establish the
# trust channel by rediscovering and re-authenticating with the trusted domain's DC.
# Without this, cross-domain authentication (e.g., parent Enterprise Admin auth
# forwarded through the child DC for domain joins) fails with Access Denied.
- name: Reset inter-domain trust secure channels after reboot
  ansible.windows.win_powershell:
    script: |
      $changed = $false

      # Enumerate all domain trusts visible to this DC
      $trustOutput = nltest /domain_trusts 2>&1
      if ($LASTEXITCODE -ne 0) {
          Write-Output "Not a DC or no trusts found — skipping trust channel reset"
          $Ansible.Changed = $false
          return
      }

      # Parse trusted domain FQDNs from nltest output
      # Format: "    0: NETBIOS fqdn.name (NT 5) (flags...)"
      $myDomain = (Get-WmiObject Win32_ComputerSystem).Domain
      $trustedDomains = @()
      foreach ($line in ($trustOutput -split "`n")) {
          if ($line -match '^\s+\d+:\s+\S+\s+(\S+\.\S+)\s') {
              $dom = $Matches[1].Trim('.')
              # Skip our own domain
              if ($dom -ne $myDomain) {
                  $trustedDomains += $dom
              }
          }
      }

      if ($trustedDomains.Count -eq 0) {
          Write-Output "No cross-domain trusts found — no trust channels to reset"
          $Ansible.Changed = $false
          return
      }

      foreach ($trust in $trustedDomains) {
          Write-Output "Resetting secure channel with trusted domain: $trust"
          $resetResult = nltest /sc_reset:$trust 2>&1
          if ($LASTEXITCODE -eq 0) {
              Write-Output "  SUCCESS: Trust channel with $trust re-established"
              $changed = $true
          } else {
              Write-Output "  WARNING: Trust channel reset with $trust returned: $resetResult"
              # Don't fail — the trust may not have a direct SC (e.g., transitive trust)
          }
      }

      # Also restart Netlogon to ensure all trust channels are cleanly initialized
      Restart-Service Netlogon -Force
      Start-Sleep -Seconds 10
      Write-Output "Netlogon service restarted to finalize trust channel recovery"
      $changed = $true

      $Ansible.Changed = $changed
  register: _trust_channel_reset
  until: _trust_channel_reset is succeeded
  retries: 5
  delay: 30
  when: _lsa_reboot.changed | default(false)

# Verify inter-domain trust channels after reboot using nltest /sc_verify.
# IMPORTANT: Do NOT use SMB "net use" as the verification test here — the LSA
# anonymous RPC settings we just applied (RestrictAnonymous=0, EveryoneIncludesAnonymous=1)
# deliberately alter NTLM authentication behavior on this DC, causing "net use" with
# cross-domain NTLM tokens to return "Access denied" even when the trust is healthy.
# Kerberos-based operations (domain joins, AD queries) are unaffected — nltest /sc_verify
# tests the actual Netlogon secure channel which uses Kerberos/NTLM at the machine level.
- name: Verify inter-domain trust via nltest /sc_verify
  ansible.windows.win_powershell:
    script: |
      $trustOutput = nltest /domain_trusts 2>&1
      if ($LASTEXITCODE -ne 0) {
          Write-Output "Not a DC or no trusts — skipping trust verification"
          $Ansible.Changed = $false
          return
      }

      # Parse trusted domain FQDNs from nltest output
      $myDomain = (Get-WmiObject Win32_ComputerSystem).Domain
      $trustedDomains = @()
      foreach ($line in ($trustOutput -split "`n")) {
          if ($line -match '^\s+\d+:\s+\S+\s+(\S+\.\S+)\s') {
              $dom = $Matches[1].Trim('.')
              if ($dom -ne $myDomain) {
                  $trustedDomains += $dom
              }
          }
      }

      if ($trustedDomains.Count -eq 0) {
          Write-Output "No cross-domain trusts found — nothing to verify"
          $Ansible.Changed = $false
          return
      }

      $allHealthy = $true
      foreach ($trust in $trustedDomains) {
          $verifyResult = nltest /sc_verify:$trust 2>&1
          if ($LASTEXITCODE -eq 0) {
              Write-Output "Trust with $trust VERIFIED via nltest /sc_verify"
          } else {
              Write-Output "WARNING: nltest /sc_verify for $trust returned non-zero — $verifyResult"
              # Don't fail — the trust may still work for Kerberos operations
              # even if nltest reports issues (common after LSA changes)
              $allHealthy = $false
          }
      }

      if (-not $allHealthy) {
          Write-Output "NOTE: Some trust verifications reported warnings. This is expected after"
          Write-Output "anonymous RPC LSA changes. Kerberos-based operations (domain joins) are"
          Write-Output "typically unaffected. Use 'nltest /sc_query:<domain>' to check manually."
      }

      $Ansible.Changed = $false
  register: _trust_verify
  until: _trust_verify is succeeded
  retries: 3
  delay: 15
  when: _lsa_reboot.changed | default(false)

- name: Display trust verification results
  ansible.builtin.debug:
    msg: "{{ _trust_verify.output | default(['No trust verification needed']) }}"
  when: _lsa_reboot.changed | default(false)

# Final readiness gate: verify the DC can actually serve authenticated AD queries.
# This proves KDC + Netlogon + LDAP are all working end-to-end, not just that the
# services are in "started" state. Uses native microsoft.ad.object_info — no PowerShell.
- name: Verify DC is fully functional after reboot (authenticated AD query)
  microsoft.ad.object_info:
    identity: "{{ ludus_domain_fqdn | default(ansible_domain) }}"
  register: _dc_functional
  until: _dc_functional is succeeded
  retries: 15
  delay: 30
  when: _lsa_reboot.changed | default(false)

# =============================================================================
# UNCONDITIONAL TRUST HEALTH CHECK (idempotency safety)
# =============================================================================
# This runs every time — NOT gated on reboot. If this role was previously applied
# and the trust channel is broken (e.g., from a failed deploy or external reboot),
# it will detect and repair it. This ensures re-runs are safe.

# Unconditional trust health check uses nltest /sc_verify (Kerberos-based) instead
# of SMB "net use". The anonymous RPC LSA settings we apply deliberately alter NTLM
# authentication, causing SMB-based cross-domain auth tests to fail with "Access denied"
# even when the trust is perfectly healthy for Kerberos operations (domain joins, etc.).
- name: Unconditional trust health check (runs every time on DCs with trusts)
  ansible.windows.win_powershell:
    script: |
      # Only relevant on DCs with trusts
      $trustOutput = nltest /domain_trusts 2>&1
      if ($LASTEXITCODE -ne 0) {
          Write-Output "Not a DC or no trusts — skipping health check"
          $Ansible.Changed = $false
          return
      }

      # Parse trusted domain FQDNs from nltest output
      $myDomain = (Get-WmiObject Win32_ComputerSystem).Domain
      $trustedDomains = @()
      foreach ($line in ($trustOutput -split "`n")) {
          if ($line -match '^\s+\d+:\s+\S+\s+(\S+\.\S+)\s') {
              $dom = $Matches[1].Trim('.')
              if ($dom -ne $myDomain) {
                  $trustedDomains += $dom
              }
          }
      }

      if ($trustedDomains.Count -eq 0) {
          Write-Output "No cross-domain trusts — nothing to check"
          $Ansible.Changed = $false
          return
      }

      $repaired = $false
      foreach ($trust in $trustedDomains) {
          $verifyResult = nltest /sc_verify:$trust 2>&1
          if ($LASTEXITCODE -eq 0) {
              Write-Output "Trust with $trust HEALTHY (nltest /sc_verify passed)"
          } else {
              Write-Output "Trust with $trust may need attention — nltest /sc_verify: $verifyResult"
              Write-Output "  Attempting nltest /sc_reset:$trust"
              nltest /sc_reset:$trust 2>&1 | ForEach-Object { Write-Output "    $_" }
              $repaired = $true

              # Re-verify after reset
              Start-Sleep -Seconds 10
              $reVerify = nltest /sc_verify:$trust 2>&1
              if ($LASTEXITCODE -eq 0) {
                  Write-Output "  Trust with $trust REPAIRED (nltest /sc_verify now passes)"
              } else {
                  Write-Output "  WARNING: Trust with $trust still reports issues after reset."
                  Write-Output "  This may be expected with anonymous RPC LSA settings applied."
                  Write-Output "  Kerberos operations (domain joins) are typically unaffected."
                  # Do NOT throw — anonymous RPC settings can cause nltest false negatives
              }
          }
      }

      $Ansible.Changed = $repaired
  register: _trust_health_check

- name: Display trust health check results
  ansible.builtin.debug:
    msg: "{{ _trust_health_check.output | default(['No trusts to check']) }}"

# =============================================================================
# VERIFICATION
# =============================================================================

- name: Verify anonymous enumeration settings
  ansible.windows.win_powershell:
    script: |
      $results = @{
          RestrictAnonymous = (Get-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'RestrictAnonymous' -ErrorAction SilentlyContinue).RestrictAnonymous
          RestrictAnonymousSAM = (Get-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'RestrictAnonymousSAM' -ErrorAction SilentlyContinue).RestrictAnonymousSAM
          EveryoneIncludesAnonymous = (Get-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'EveryoneIncludesAnonymous' -ErrorAction SilentlyContinue).EveryoneIncludesAnonymous
          NullSessionPipes = (Get-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters' -Name 'NullSessionPipes' -ErrorAction SilentlyContinue).NullSessionPipes
          RestrictNullSessAccess = (Get-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters' -Name 'RestrictNullSessAccess' -ErrorAction SilentlyContinue).RestrictNullSessAccess
      }
      $results | ConvertTo-Json
  register: _anon_verify

- name: Display anonymous enumeration verification
  ansible.builtin.debug:
    msg: "{{ _anon_verify.output | default('Verification complete') }}"

# =============================================================================
# SUMMARY
# =============================================================================

- name: Display anonymous enumeration summary
  ansible.builtin.debug:
    msg: |
      ============================================
      Anonymous RPC/SMB Configuration for {{ ansible_hostname }}
      ============================================
      RestrictAnonymous: {{ ludus_restrict_anonymous }} (0=permissive)
      RestrictAnonymousSAM: {{ ludus_restrict_anonymous_sam }} (0=allow enum)
      EveryoneIncludesAnonymous: {{ ludus_everyone_includes_anonymous }}
      
      Anonymous Named Pipes:
      {% for pipe in ludus_anonymous_named_pipes %}
        - {{ pipe }}
      {% endfor %}
      
      Attack Techniques Enabled:
        - enum4linux / enum4linux-ng
        - rpcclient -U '' -N enumdomusers
        - lookupsid.py anonymous SID enumeration
        - CrackMapExec anonymous enum
      ============================================
