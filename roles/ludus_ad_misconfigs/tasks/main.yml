# ============================================================================
# WEBCLIENT SERVICE (PetitPotam WebDAV Coercion)
# ============================================================================

- name: Enable WebClient service for coercion attacks
  when: ludus_webclient_enabled | default(false) | bool
  block:
    - name: Install WebDAV-Redirector feature for WebClient service
      ansible.windows.win_feature:
        name: WebDAV-Redirector
        state: present
      register: _webclient_feature

    - name: Reboot if WebDAV-Redirector feature requires it
      ansible.windows.win_reboot:
        reboot_timeout: 900
        post_reboot_delay: 30
      when: _webclient_feature.reboot_required | default(false)

    # After any reboot on a domain-joined member server, the secure channel
    # (machine account password trust) can break — especially if other roles
    # (e.g., ludus_ad_laps) moved the computer object to a different OU.
    # Test and repair the channel before proceeding with domain-dependent tasks.
    - name: Verify and repair domain secure channel after reboot
      ansible.windows.win_powershell:
        script: |
          if (-not (Test-ComputerSecureChannel -ErrorAction SilentlyContinue)) {
              Write-Output "BROKEN: Secure channel is broken, attempting repair..."
              try {
                  Test-ComputerSecureChannel -Repair -ErrorAction Stop
                  Write-Output "REPAIRED: Secure channel repaired successfully"
                  $Ansible.Changed = $true
              } catch {
                  Write-Error "FAILED: Could not repair secure channel: $($_.Exception.Message)"
              }
          } else {
              Write-Output "OK: Secure channel is healthy"
          }
      when: _webclient_feature.reboot_required | default(false)
      register: _secure_channel_result

    # After the reboot, TCP ports (88, 389, 445) answer quickly but the Netlogon
    # authentication stack — which authenticates net use \\DC\NETLOGON — takes
    # longer. Any downstream role (e.g. ludus_child_domain_join on a member server)
    # that depends_on this role completing will attempt that SMB auth check
    # immediately. We prove Netlogon is ready here so depends_on is a genuine gate.
    - name: Wait for Netlogon SMB auth stack to be ready after reboot
      ansible.windows.win_powershell:
        script: |
          $svc = Get-Service -Name Netlogon -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -eq 'Running') {
              Write-Output "Netlogon service is running"
              $Ansible.Changed = $false
          } else {
              throw "Netlogon service is not yet running"
          }
      register: _netlogon_ready
      until: _netlogon_ready is succeeded
      retries: 20
      delay: 15
      changed_when: false
      when: _webclient_feature.reboot_required | default(false)

    - name: Ensure WebClient service is running
      ansible.windows.win_service:
        name: WebClient
        start_mode: auto
        state: started

    - name: Log WebClient enabled
      ansible.builtin.debug:
        msg: "WebClient service enabled - host is vulnerable to WebDAV coercion"

# ============================================================================
# LDAP SIGNING CONFIGURATION
# ============================================================================

- name: Disable LDAP signing for relay attacks
  when: ludus_ldap_signing_disabled | default(false) | bool
  block:
    - name: Disable LDAP signing requirement
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\NTDS\Parameters
        name: LDAPServerIntegrity
        data: 1
        type: dword
        state: present

    - name: Log LDAP signing disabled
      ansible.builtin.debug:
        msg: "LDAP signing disabled - host is vulnerable to LDAP relay attacks"

# ============================================================================
# MACHINE ACCOUNT QUOTA (KrbRelayUp)
# ============================================================================

- name: Configure Machine Account Quota
  when: ludus_machine_account_quota_enabled | default(false) | bool
  block:
    - name: Set ms-DS-MachineAccountQuota
      ansible.windows.win_powershell:
        script: |
          param($QuotaValue)
          Import-Module ActiveDirectory
          try {
              $domain = Get-ADDomain
              Set-ADDomain -Identity $domain -Replace @{'ms-DS-MachineAccountQuota'=$QuotaValue}
              Write-Output "SUCCESS: ms-DS-MachineAccountQuota set to $QuotaValue"
          } catch {
              Write-Error "FAILED: $($_.Exception.Message)"
          }
        parameters:
          QuotaValue: "{{ ludus_machine_account_quota_value | int }}"
      changed_when: "'SUCCESS' in _quota_result.output | default('')"
      register: _quota_result

    - name: Log Machine Account Quota configured
      ansible.builtin.debug:
        msg: "ms-DS-MachineAccountQuota set to {{ ludus_machine_account_quota_value }}"

